version: 2
before:
  hooks:
    - go mod download
    - go mod tidy
builds:
  - id: rrsh_linux_amd64
    binary: rrsh
    ldflags:
      - "-s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}"
    goos: [ linux ]
    goarch: [ amd64 ]
  - id: rrsh_linux_armv6
    binary: rrsh
    ldflags:
      - "-s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}"
    goos: [ linux ]
    goarch: [ arm ]
    goarm: [ 6 ]
  - id: rrsh_linux_armv7
    binary: rrsh
    ldflags:
      - "-s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}"
    goos: [ linux ]
    goarch: [ arm ]
    goarm: [ 7 ]
  - id: rrsh_linux_arm64
    binary: rrsh
    ldflags:
      - "-s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}"
    goos: [ linux ]
    goarch: [ arm64 ]
nfpms:
  - package_name: rrsh
    homepage: https://github.com/binwiederhier/rrsh
    maintainer: Philipp C. Heckel <phil@heckel.io>
    description: JSON-RPC login shell that allowlists commands for AI agents
    license: Apache 2.0
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: pkg/etc/rrsh/rrsh.json.example
        dst: /etc/rrsh/rrsh.json.example
      - src: pkg/etc/sudoers.d/rrsh
        dst: /etc/sudoers.d/rrsh
        type: "config|noreplace"
        file_info:
          mode: 0440
          owner: root
          group: root
      - src: pkg/var/lib/rrsh/.hushlogin
        dst: /var/lib/rrsh/.hushlogin
    scripts:
      postinstall: "scripts/postinst.sh"
      postremove: "scripts/postrm.sh"
archives:
  - id: rrsh_linux
    ids:
      - rrsh_linux_amd64
      - rrsh_linux_armv6
      - rrsh_linux_armv7
      - rrsh_linux_arm64
    wrap_in_directory: true
    files:
      - LICENSE
      - README.md
      - pkg/etc/rrsh/rrsh.json.example
checksum:
  name_template: 'checksums.txt'
snapshot:
  version_template: "{{ .Tag }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
